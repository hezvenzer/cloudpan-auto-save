# .github/workflows/build-armv7-ghcr.yml
name: Build and Push ARMv7 to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      custom_version:
        description: '可选：自定义版本号（留空则使用 package.json 版本）'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Clean build validation
        run: yarn build

      - name: Run tests with coverage
        run: yarn test:ci

      - name: Legacy smoke (non-blocking)
        continue-on-error: true
        run: yarn test:legacy

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build-armv7:
    runs-on: ubuntu-latest
    needs: test  # 等待测试通过后再构建

    permissions:
      contents: read
      packages: write  # GHCR 推送必需权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json or input
        id: pkg
        run: |
          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            echo "version=${{ github.event.inputs.custom_version }}" >> $GITHUB_OUTPUT
            echo "使用手动输入版本: ${{ github.event.inputs.custom_version }}"
          else
            echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
            echo "使用 package.json 版本: $(node -p "require('./package.json').version")"
          fi

      - name: Resolve app runtime version
        id: appver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "使用发布 tag 版本: ${GITHUB_REF#refs/tags/v}"
          else
            echo "version=${{ steps.pkg.outputs.version }}" >> $GITHUB_OUTPUT
            echo "使用 package 版本: ${{ steps.pkg.outputs.version }}"
          fi

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cloudpan-auto-save
          tags: |
            # 主分支推送或手动触发：打 latest 和版本号
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.pkg.outputs.version }},enable={{is_default_branch}}
            # Git tag 推送：提取 semver 并同步更新 latest
            type=match,pattern=v(.*),group=1,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # PR 时仅构建验证
            type=ref,event=pr

      - name: Build and push ARMv7
        uses: docker/build-push-action@v5
        with:
          context: .
          # PR 时只构建不推送，其他情况构建并推送
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          # 仅构建 linux/arm/v7 架构
          platforms: linux/arm/v7
          build-args: |
            APP_VERSION=${{ steps.appver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
